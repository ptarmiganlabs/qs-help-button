name: ci
on:
  workflow_dispatch:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      release_tag_name: ${{ steps.release.outputs['tag_name'] }}
      release_version: ${{ steps.release.outputs['version'] }}
      release_upload_url: ${{ steps.release.outputs['upload_url'] }}
    env:
      GITHUB_REF: ${{ github.ref }}
      GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
    steps:
      - name: Show github.ref
        run: echo "$GITHUB_REF"

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        if: github.repository_owner == 'ptarmiganlabs'
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

      - name: Show output from Release-Please
        if: always()
        env:
          RELEASE_PLEASE_OUTPUT: ${{ toJSON(steps.release.outputs) }}
        run: echo "$RELEASE_PLEASE_OUTPUT"

      - name: Show output from Release-Please
        run: |
          echo "releases_created: ${{ steps.release.outputs.releases_created }}"
          echo "release_created : ${{ steps.release.outputs.release_created }}"
          echo "draft           : ${{ steps.release.outputs['draft'] }}"
          echo "path            : ${{ steps.release.outputs['path'] }}"
          echo "upload_url      : ${{ steps.release.outputs['upload_url'] }}"
          echo "html_url        : ${{ steps.release.outputs['html_url'] }}"
          echo "tag_name        : ${{ steps.release.outputs['tag_name'] }}"
          echo "version         : ${{ steps.release.outputs['version'] }}"
          echo "major           : ${{ steps.release.outputs['major'] }}"
          echo "minor           : ${{ steps.release.outputs['minor'] }}"
          echo "patch           : ${{ steps.release.outputs['patch'] }}"
          echo "sha             : ${{ steps.release.outputs['sha'] }}"

  build-release:
    needs: release-please
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      contents: write
    env:
      DIST_FILE_NAME: helpbutton-qs
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create basic variant zip
        run: |
          VERSION=${{ needs.release-please.outputs.release_version }}
          sed "s/__VERSION__/${VERSION}/g" release-config/html-variant-readme-template.txt > readme.txt
          cd variants/basic
          zip -r "../../${DIST_FILE_NAME}-basic-v${VERSION}.zip" \
            README.md \
            da \
            de \
            en \
            es \
            fi \
            fr \
            no \
            pl \
            sv \
            -x "*/node_modules/*"
          cd ../..
          zip -j "${DIST_FILE_NAME}-basic-v${VERSION}.zip" LICENSE readme.txt

      - name: Create bug-report variant zip
        run: |
          VERSION=${{ needs.release-please.outputs.release_version }}
          cd variants/bug-report
          zip -r "../../${DIST_FILE_NAME}-bug-report-v${VERSION}.zip" \
            README.md \
            da \
            de \
            en \
            es \
            fi \
            fr \
            no \
            pl \
            sv \
            -x "*/node_modules/*"
          cd ../..
          zip -j "${DIST_FILE_NAME}-bug-report-v${VERSION}.zip" LICENSE readme.txt

      - name: List zip contents (debug)
        run: |
          echo "=== Basic variant ==="
          zipinfo "${DIST_FILE_NAME}-basic-v${{ needs.release-please.outputs.release_version }}.zip"
          echo ""
          echo "=== Bug-report variant ==="
          zipinfo "${DIST_FILE_NAME}-bug-report-v${{ needs.release-please.outputs.release_version }}.zip"

      - name: Install Chromium
        run: sudo apt-get install -y chromium-browser

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Build extension
        run: |
          cd extension
          PUPPETEER_SKIP_DOWNLOAD=true npm ci
          npm run pack:prod

      - name: Generate README PDF
        run: |
          cd extension
          PUPPETEER_EXECUTABLE_PATH=$(which chromium-browser 2>/dev/null || which chromium) \
            md-to-pdf README.md

      - name: Create extension release zip
        run: |
          VERSION=${{ needs.release-please.outputs.release_version }}

          # Create readme.txt from template
          sed "s/__VERSION__/${VERSION}/g" release-config/extension-readme-template.txt > readme.txt

          # Create outer zip containing the extension zip + readme + license
          zip -j "${DIST_FILE_NAME}-extension-v${VERSION}.zip" \
            extension/helpbutton-qs.zip \
            extension/README.md \
            extension/README.pdf \
            readme.txt \
            LICENSE

          echo ""
          echo "=== Extension variant ==="
          zipinfo "${DIST_FILE_NAME}-extension-v${VERSION}.zip"

      - name: Upload release artifacts
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitDraftDuringUpdate: true
          tag: ${{ needs.release-please.outputs.release_tag_name }}
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          artifacts: |
            ${{ env.DIST_FILE_NAME }}-basic-v${{ needs.release-please.outputs.release_version }}.zip
            ${{ env.DIST_FILE_NAME }}-bug-report-v${{ needs.release-please.outputs.release_version }}.zip
            ${{ env.DIST_FILE_NAME }}-extension-v${{ needs.release-please.outputs.release_version }}.zip
