# TEMPORARY — delete after PDF output has been verified.
name: test-pdf-generation

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install PDF tools
        run: PUPPETEER_SKIP_DOWNLOAD=true npm install -g md-to-pdf@5.2.4 @mermaid-js/mermaid-cli@11.12.0

      - name: Generate README PDF
        run: |
          # ubuntu-latest ships google-chrome-stable; use it for both mmdc and md-to-pdf
          CHROME=$(which google-chrome-stable 2>/dev/null || which chromium-browser 2>/dev/null || which chromium)
          echo "Chrome executable: $CHROME"

          # Write puppeteer config for mmdc
          echo "{\"executablePath\":\"$CHROME\",\"args\":[\"--no-sandbox\",\"--disable-setuid-sandbox\"]}" > /tmp/mmdc-puppeteer.json

          cd extension

          # Step 1: convert Mermaid code blocks to SVG images
          mmdc -i README.md -o README-processed.md --puppeteerConfigFile /tmp/mmdc-puppeteer.json

          # Step 2: render the processed markdown (with inline SVG refs) to PDF
          PUPPETEER_EXECUTABLE_PATH="$CHROME" md-to-pdf README-processed.md --output README.pdf

          # Clean up intermediate artefacts
          rm -f README-processed.md README-processed-*.svg
          echo "PDF size: $(du -sh README.pdf)"

      - name: Create draft release with PDF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="pdf-test-$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" \
            extension/README.pdf \
            --draft \
            --title "[TEST] README PDF output — $TAG" \
            --notes "Temporary test release for verifying README PDF generation. Delete after review."
          echo "Draft release created with tag: $TAG"
