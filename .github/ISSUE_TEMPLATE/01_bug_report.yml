name: "\U0001F41E Bug Report"
description: Create a bug report for HelpButton.qs
labels: 'template: bug'
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report! Please fill out this form as completely as possible.
  - type: markdown
    attributes:
      value: 'Please first search the repository for similar issues and discussions.'
  - type: dropdown
    attributes:
      label: Which variant are you using?
      options:
        - basic
        - bug-report
        - extension
    validations:
      required: true
  - type: input
    attributes:
      label: What version of HelpButton.qs are you using?
      description: 'Check the @version tag at the top of helpbutton-qs.js — for example: 2.0.0'
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Which Qlik Sense environment are you using?
      description: 'Is the bug related to Qlik Sense Client-Managed, Qlik Cloud, or both?'
      options:
        - Qlik Cloud
        - Qlik Sense Enterprise on Windows (Client-Managed)
        - Both
        - Not sure
    validations:
      required: true
  - type: input
    attributes:
      label: What Qlik Sense version are you using?
      description: 'For example: 2025 November IR (8.527.8). For Qlik Cloud, enter N/A'
    validations:
      required: true
  - type: input
    attributes:
      label: What browser are you using?
      description: 'For example: Chrome 120, Edge 120, Firefox 121'
    validations:
      required: true
  - type: input
    attributes:
      label: What operating system are you using?
      description: 'For example: Windows 11, Windows Server 2022'
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: textarea
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior. Screenshots can be provided in the issue body below.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Configuration
      description: Paste relevant parts of your helpbutton-qs.config.js (redact any sensitive URLs or tokens).
      render: javascript
    validations:
      required: false
  - type: markdown
    attributes:
      value: Before posting the issue go through the steps you've written down to make sure the steps provided are detailed and clear.
  - type: markdown
    attributes:
      value: Contributors should be able to follow the steps provided in order to reproduce the bug.
  - type: markdown
    attributes:
      value: The information you enter on this page will be used to improve and enhance this project. Thanks in advance!
